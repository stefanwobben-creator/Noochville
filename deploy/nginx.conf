# NoochVille — nginx config voor village.nooch.earth
# Na `certbot --nginx` vult Certbot de SSL-blokken automatisch in.

server {
    listen 80;
    listen [::]:80;
    server_name village.nooch.earth;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name village.nooch.earth;

    # SSL — ingevuld door Certbot:
    # ssl_certificate     /etc/letsencrypt/live/village.nooch.earth/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/village.nooch.earth/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://127.0.0.1:8766;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
