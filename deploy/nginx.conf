# NoochVille — nginx config voor village.nooch.earth
# Initieel alleen HTTP. Certbot voegt SSL-blok en redirect automatisch toe
# via: certbot --nginx -d village.nooch.earth

server {
    listen 80;
    listen [::]:80;
    server_name village.nooch.earth;

    # Upload-limiet: bestandsbijlagen op de projectwall. De app-limiet (upload_max_bytes, default 20M)
    # ligt bewust lager zodat de app zelf de nette fout geeft; deze 25M is het harde nginx-plafond.
    client_max_body_size 25M;

    location / {
        proxy_pass         http://127.0.0.1:8766;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
