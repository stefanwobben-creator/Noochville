[DEFAULT]
max_retries = 3
heartbeat_seconds = 0
# Vast kloktijdstip (HH:MM) waarop de dagcyclus (dag_begint) één keer per dag afgaat bij `village run`.
# De tijdzone staat expliciet in dag_begint_tz (IANA-naam, via stdlib zoneinfo), LOS van de server-tz —
# Nooch zit in Spanje, dus Europe/Madrid. _should_fire_daily én de persist-check (timekeeper_last_day.json)
# rekenen tegen deze zone. Restart-bestendig: het laatst-gevuurde moment staat in dat bestand, dus een
# herstart/deploy laat het volgende moment niet verschuiven en vuurt niet dubbel.
dag_begint_time = 04:32
dag_begint_tz = Europe/Madrid
# Wind-down stap 1 (2026-07-16): opportunity-reflex uit (was 604800). Village-breed; stopt de
# aanwas van 'opportunity'-items in de human-inbox van cockpit 1. Terug naar 604800 om te herstellen.
reflect_interval_seconds = 99999999999
tijdgeest_interval_seconds = 0
# WIP-limiet op autonome projectvoorbereiding (aangezet door de cirkelpolicy WIP-001). Expliciete
# getal-bron; NIET uit de policy-body geparsed. Alleen effectief zolang WIP-001 actief is.
wip_prepare_limit = 8
inbox_approve_timeout = 5
trends_time_budget_seconds = 30
trends_keywords_per_pulse = 3
serpapi_interval_seconds = 604800
# Cadans voor de LLM-proza van de Field Note (wind-down 2026-07-16): wekelijks i.p.v. dagelijks, om
# LLM-verbruik te sparen. De dagelijkse data (tension, last_pulse, raw json) draait sowieso door.
# 0 = elke puls (oud gedrag).
field_note_interval_seconds = 604800
serpapi_keywords_per_run = 5

# De Librarian verrijkt elke kandidaat (GSC, SerpAPI-Trends, ngram) centraal met echt
# KeywordsEverywhere-zoekvolume vóór de beoordeling. Boven de drempel keurt hij automatisch
# goed; eronder gaat de term naar je dashboard. Elke nieuwe term wordt door de dedup precies
# één keer gemeten (1 credit). 0 = auto-approve uit.
ke_auto_approve_volume = 100
# KeywordsEverywhere heeft geen bruikbare NL-data (geeft 0 terug). Leeg = global, dat werkt
# voor zowel Nederlandse termen (≈ NL/BE-markt) als merken/Engels.
ke_country =

# Concurrent-scout: merken die we monitoren (komma-gescheiden) + getrapt venster in dagen.
# Per merk wordt het kortste venster met nieuws gekozen: eerst maand, dan kwartaal, dan jaar.
competitor_brands = Veja, Moea, Flamingos Life, Komrads
competitor_windows = 30, 90, 365
# Footwear-context die elke merkquery afdwingt (lost homoniemen op, bv. Moea = overheid).
# Leeglaten = de ingebouwde default. Onleesbare datums worden hard overgeslagen.
# competitor_context = "sneakers" OR "footwear" OR "shoes" OR "vegan leather"
# Linkbuilding-radar: query voor gidsen/lijstjes (leeglaten = ingebouwde default).
# linkbuilding_query = ("best" OR "guide") AND ("sustainable sneakers" OR "ethical shoes")

# ── Externe observatie-bronnen: BEVROREN snapshot ─────────────────────────────────────────────
# Uitsluitend vastlegging (geen KPI/analyse). Zie skills_impl/{stooq,trends_categorie,gdelt_tone}.py.
# BEVRIEZINGSREGEL: termenset/timeframe/symbolen wijzigen = bewuste aanpassing hier PLUS source_version +1.
# Index-slotkoersen via Alpha Vantage (Stooq is gedeactiveerd — zat achter een JS-challenge). Alpha
# Vantage dekt de ruwe indices NIET, alleen tracking-ETF's: spx→SPY (S&P 500-ETF, USD),
# aex→IAEX.AMS (iShares AEX UCITS ETF, EUR). De vastgelegde koers is de ETF-koers, niet het index-niveau
# (bewuste afwijking, zie skills_impl/alphavantage.py). Key staat in .env (ALPHAVANTAGE_API_KEY).
alphavantage_symbols = spx:SPY, aex:IAEX.AMS
alphavantage_source_version = 1
# Trends-categorie: bevroren categorietermen (Library-woorden), één batch, timeframe now 7-d.
trends_cat_terms = footwear, sustainable shoes, vegan shoes
trends_cat_timeframe = now 7-d
trends_cat_geo =
trends_cat_source_version = 1
# Trends stemming-paren (bron 'trends'): ratio A/B per paar (A=zuinigheid/behoud, B=toegeeflijkheid/nieuw;
# oriëntatie is een meetconstante). Fail-closed: ontbreekt/leeg/misvormd paar → bron levert niets (geen
# default, geen partial parse). Formaat: komma-gescheiden 'A:B'-paren; termen mogen spaties bevatten.
trends_pairs = thrift:luxury, second hand:brand new, repair:replace, slow fashion:fast fashion
# GDELT-tone: bevroren Engelstalige categorietermen.
gdelt_terms = sustainable footwear, vegan footwear
gdelt_source_version = 1

# Einddocument-synthese (feat/einddocument): harde input-cap vóór de LLM-call (call_site="einddocument").
# Fail-loud bij afkap (DOC_INPUT_CAP-logregel), nooit stil. Duurste nieuwe prompt-site → cap vanaf dag één.
einddocument_input_max_chars = 20000

# ── Dimensies (scope 2/4): gecureerde selectie + cap per dimensie-bron ─────────────────────────
# GSC per Library-keyword (scope 2): selectie = approved+doelwit uit de Library; alleen de cap staat hier.
gsc_dimension_max = 50
# Plausible per land (scope 4): gecureerde landenlijst (ISO 3166-1 alpha-2), cap + drop-log als bij GSC.
plausible_dimension_countries = NL, BE, DE, FR, ES, GB, US
plausible_dimension_max = 50
# OpenAlex per concept: GEPINDE 'naam:concept-ID'-paren. De skill telt per week de works die in een
# 90/30-venster verschenen via works?filter=concepts.id:<ID> (LIVE tag-count) — niet de bevroren
# /concepts-aggregaat. Alle 6 delen hetzelfde venster voor vergelijkbaarheid. Fail-closed: leeg/ongeldig
# paar → bron levert niets. Bewust NIET gedekt (geen bruikbaar concept): vegan leather, textile recycling,
# right to repair — het repair-signaal komt uit de Trends-paren.
openalex_concepts = biodegradable polymers:C45211672, natural fibers:C2776176653, sustainable consumption:C2776770324, ecodesign:C2779439448, mycelium:C133479454, biomaterial:C2778414984
