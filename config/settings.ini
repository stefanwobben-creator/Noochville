[DEFAULT]
max_retries = 3
heartbeat_seconds = 0
# Vast kloktijdstip (lokale tijd, HH:MM) waarop de dagcyclus (dag_begint) één keer per dag afgaat
# bij `village run`. Restart-bestendig: het laatst-gevuurde moment staat in data/timekeeper_last_day.json,
# dus een herstart/deploy laat het volgende moment niet verschuiven en vuurt niet dubbel.
dag_begint_time = 04:32
reflect_interval_seconds = 604800
tijdgeest_interval_seconds = 0
inbox_approve_timeout = 5
trends_time_budget_seconds = 30
trends_keywords_per_pulse = 3
serpapi_interval_seconds = 604800
serpapi_keywords_per_run = 5

# De Librarian verrijkt elke kandidaat (GSC, SerpAPI-Trends, ngram) centraal met echt
# KeywordsEverywhere-zoekvolume vóór de beoordeling. Boven de drempel keurt hij automatisch
# goed; eronder gaat de term naar je dashboard. Elke nieuwe term wordt door de dedup precies
# één keer gemeten (1 credit). 0 = auto-approve uit.
ke_auto_approve_volume = 100
# KeywordsEverywhere heeft geen bruikbare NL-data (geeft 0 terug). Leeg = global, dat werkt
# voor zowel Nederlandse termen (≈ NL/BE-markt) als merken/Engels.
ke_country =

# Concurrent-scout: merken die we monitoren (komma-gescheiden) + getrapt venster in dagen.
# Per merk wordt het kortste venster met nieuws gekozen: eerst maand, dan kwartaal, dan jaar.
competitor_brands = Veja, Moea, Flamingos Life, Komrads
competitor_windows = 30, 90, 365
# Footwear-context die elke merkquery afdwingt (lost homoniemen op, bv. Moea = overheid).
# Leeglaten = de ingebouwde default. Onleesbare datums worden hard overgeslagen.
# competitor_context = "sneakers" OR "footwear" OR "shoes" OR "vegan leather"
# Linkbuilding-radar: query voor gidsen/lijstjes (leeglaten = ingebouwde default).
# linkbuilding_query = ("best" OR "guide") AND ("sustainable sneakers" OR "ethical shoes")
